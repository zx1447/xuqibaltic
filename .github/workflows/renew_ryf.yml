name: RYF Continuous Check and Renew

on:
  schedule:
    # 每 6 小时启动一个持续窗口；窗口内每小时检查一次。
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "持续运行分钟数（测试可填 2；默认 350 分钟）"
        required: false
        default: "350"

permissions:
  contents: write

concurrency:
  group: ryf-auto-renew
  cancel-in-progress: true

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Checkout RYF branch
        uses: actions/checkout@v4
        with:
          ref: ryf
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --upgrade pip requests "requests[socks]" cryptography

      - name: Run RYF continuous check
        env:
          RYF_DISCORD_TOKEN: ${{ secrets.FLARELAX_DISCORD_TOKEN }}
          RYF_SESSION_KEY: ${{ secrets.RYF_SESSION_KEY }}
          RYF_PROXY: ${{ secrets.RYF_PROXY }}
          RUN_MINUTES: ${{ github.event.inputs.duration_minutes || '350' }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python renew_ryf.py

      - name: Save RYF session state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ryf_state.json || true
          if git diff --cached --quiet; then
            echo "No RYF state change."
            exit 0
          fi
          git commit -m "Update RYF continuous state [skip ci]"
          git push origin HEAD:ryf
