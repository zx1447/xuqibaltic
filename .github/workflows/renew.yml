name: Auto Renew Server

# 自动续期说明：
#   脚本采用 SeleniumBase 真浏览器（uc 模式）访问面板，能像真人浏览器一样
#   通过反爬防护盾(M.E.O.W)。这样即使是 GitHub 托管 runner 也有机会通过
#   （反爬盾对"真浏览器指纹"放行，对裸 requests 拦截）。
#   若仍被拦截（极端情况下数据中心 IP 被硬封），可改用自托管 runner
#   （把 runs-on 改成 self-hosted）或用本机 run_local.ps1。

on:
  schedule:
    # 每天 UTC 03:00 和 15:00 各跑一次（北京时间 11:00 / 23:00）
    # 面板只在到期前 7 天开放续期，其余时间脚本会正常空跑
    - cron: "0 3 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch: {}   # 允许在 Actions 页面手动触发

concurrency:
  group: auto-renew
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (Chrome)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb
          # 安装 Google Chrome
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add - 2>/dev/null || true
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || sudo apt-get install -y chromium-browser
          google-chrome --version || chromium-browser --version

      - name: Install Python deps
        run: pip install --upgrade pip seleniumbase

      - name: Install chromedriver
        run: python -m seleniumbase install chromedriver

      - name: Run renew
        env:
          BLINKY_USER: ${{ secrets.BLINKY_USER }}
          BLINKY_PASS: ${{ secrets.BLINKY_PASS }}
          SESSION_COOKIE: ${{ secrets.SESSION_COOKIE }}
          SERVER_ID: ${{ secrets.SERVER_ID }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HEADLESS: "true"
        run: python renew.py
