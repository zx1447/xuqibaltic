name: Auto Renew Server

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch: {}

concurrency:
  group: auto-renew
  cancel-in-progress: true

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Start Cloudflare WARP SOCKS5 Proxy
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ noble main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          sudo warp-svc &
          sleep 3
          warp-cli --accept-tos registration new || true
          warp-cli --accept-tos mode proxy || true
          warp-cli --accept-tos proxy port 40001 || true
          warp-cli --accept-tos connect || true
          sleep 3
          echo "=== WARP SOCKS5 PROXY CHECK ==="
          curl -x socks5h://127.0.0.1:40001 https://ipinfo.io/json || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (Chrome)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add - 2>/dev/null || true
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || sudo apt-get install -y chromium-browser
          google-chrome --version || chromium-browser --version

      - name: Install Python deps
        run: pip install --upgrade pip seleniumbase

      - name: Install chromedriver
        run: python -m seleniumbase install chromedriver

      - name: Run renew
        env:
          BLINKY_USER: ${{ secrets.BLINKY_USER }}
          BLINKY_PASS: ${{ secrets.BLINKY_PASS }}
          SESSION_COOKIE: ${{ secrets.SESSION_COOKIE }}
          SERVER_ID: ${{ secrets.SERVER_ID }}
          PROXY_SERVER: "socks5://127.0.0.1:40001"
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HEADLESS: "true"
        run: python renew.py
