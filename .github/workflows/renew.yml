name: Auto Renew Server

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch: {}

concurrency:
  group: auto-renew
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cloudflare WARP (WireGuard)
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard-tools resolvconf
          curl -sSL "https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64" -o wgcf
          chmod +x wgcf
          ./wgcf register --accept-tos
          ./wgcf generate
          # avoid breaking local runner connectivity by adjusting route
          sed -i 's/AllowedIPs = .*/AllowedIPs = 0.0.0.0\/1, 128.0.0.0\/1/' wgcf-profile.conf
          sudo cp wgcf-profile.conf /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          echo "=== PUBLIC IP via WARP ==="
          curl -s https://ipinfo.io/json || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (Chrome)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add - 2>/dev/null || true
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || sudo apt-get install -y chromium-browser
          google-chrome --version || chromium-browser --version

      - name: Install Python deps
        run: pip install --upgrade pip seleniumbase

      - name: Install chromedriver
        run: python -m seleniumbase install chromedriver

      - name: Run renew
        env:
          BLINKY_USER: ${{ secrets.BLINKY_USER }}
          BLINKY_PASS: ${{ secrets.BLINKY_PASS }}
          SESSION_COOKIE: ${{ secrets.SESSION_COOKIE }}
          SERVER_ID: ${{ secrets.SERVER_ID }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HEADLESS: "true"
        run: python renew.py
