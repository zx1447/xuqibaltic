name: Flarelax AFK Continuous Points

on:
  schedule:
    # 每 6 小时启动一个新的 AFK 积分窗口。
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "本次持续运行分钟数（测试可填 2；默认 350 分钟）"
        required: false
        default: "350"

permissions:
  contents: write

concurrency:
  group: flarelax-afk-claim
  cancel-in-progress: true

jobs:
  afk:
    runs-on: ubuntu-latest
    # 350 分钟运行窗口 + 启动余量，下一次 6 小时调度时重新启动。
    timeout-minutes: 355
    steps:
      - name: Checkout Flarelax branch
        uses: actions/checkout@v4
        with:
          ref: flarelax
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --upgrade pip requests "requests[socks]"

      - name: Run Flarelax AFK continuous points and renewal
        env:
          FLARELAX_DISCORD_TOKEN: ${{ secrets.FLARELAX_DISCORD_TOKEN }}
          # 可选：提供时优先使用；没有则自动轮询公开节点池。
          FLARELAX_PROXY: ${{ secrets.FLARELAX_PROXY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RUN_MINUTES: ${{ github.event.inputs.duration_minutes || '350' }}
        run: python renew_flarelax.py

      - name: Save Flarelax renewal state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flarelax_state.json || true
          if git diff --cached --quiet; then
            echo "No Flarelax renewal state change."
            exit 0
          fi
          git commit -m "Update Flarelax renewal state [skip ci]"
          git push origin HEAD:flarelax
