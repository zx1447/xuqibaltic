name: TreeMC Host Auto Renew

on:
  schedule:
    # 每 4 小时运行一次 (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: treemc-auto-renew
  cancel-in-progress: true

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout TreeMC branch
        uses: actions/checkout@v4
        with:
          ref: tree
          fetch-depth: 0

      - name: Install and Start Cloudflare WARP (SOCKS5 Proxy)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ noble main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          sudo warp-svc &
          sleep 3
          warp-cli --accept-tos registration new || true
          warp-cli --accept-tos mode proxy || true
          warp-cli --accept-tos proxy port 40001 || true
          warp-cli --accept-tos connect || true
          sleep 3
          echo "=== WARP PROXY CHECK ==="
          curl -x socks5h://127.0.0.1:40001 https://ipinfo.io/json || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (Chrome)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add - 2>/dev/null || true
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || sudo apt-get install -y chromium-browser
          google-chrome --version || chromium-browser --version

      - name: Install Python deps
        run: pip install --upgrade pip seleniumbase requests "requests[socks]" cryptography

      - name: Install chromedriver
        run: python -m seleniumbase install chromedriver

      - name: Run TreeMC Renew
        env:
          TREEMC_TOKEN: ${{ secrets.TREEMC_TOKEN }}
          TREEMC_SESSION_KEY: ${{ secrets.TREEMC_SESSION_KEY }}
          TREEMC_COOKIE: ${{ secrets.TREEMC_COOKIE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: "socks5://127.0.0.1:40001"
          HEADLESS: "true"
        run: python renew_treemc.py

      - name: Save TreeMC session state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add treemc_state.json || true
          if git diff --cached --quiet; then
            echo "No TreeMC session state change."
            exit 0
          fi
          git commit -m "Update TreeMC session state [skip ci]"
          git push origin HEAD:tree
