name: Bitercloud Server Auto Renew

on:
  schedule:
    # 每 3 天自动运行一次 (每天 00:00 UTC 校验日期步长，相当于每 3 天一次)
    - cron: "0 0 */3 * *"
  workflow_dispatch: {}

concurrency:
  group: bitercloud-auto-renew
  cancel-in-progress: true

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install --upgrade pip requests "requests[socks]"

      - name: Run Bitercloud Renew
        env:
          BITERCLOUD_USER: ${{ secrets.BITERCLOUD_USER }}
          BITERCLOUD_PASS: ${{ secrets.BITERCLOUD_PASS }}
          BITERCLOUD_COOKIE: ${{ secrets.BITERCLOUD_COOKIE }}
          BITERCLOUD_SERVER_ID: ${{ secrets.BITERCLOUD_SERVER_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python renew_bitercloud.py
