name: CoredLab Daily Visit

on:
  schedule:
    # 每天访问一次控制台，默认不重复登录。
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "是否忽略每日间隔并立即访问（true/false）"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: coredlab-daily-visit
  cancel-in-progress: true

jobs:
  visit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout CoredLab branch
        uses: actions/checkout@v4
        with:
          ref: coredlab
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --upgrade pip requests "requests[socks]" cryptography

      - name: Run CoredLab daily visit
        env:
          COREDLAB_DISCORD_TOKEN: ${{ secrets.COREDLAB_DISCORD_TOKEN }}
          COREDLAB_SESSION_KEY: ${{ secrets.COREDLAB_SESSION_KEY }}
          COREDLAB_PROXY: ${{ secrets.COREDLAB_PROXY }}
          FORCE_RUN: ${{ github.event.inputs.force }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python renew_coredlab.py

      - name: Save CoredLab session state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coredlab_state.json || true
          if git diff --cached --quiet; then
            echo "No CoredLab state change."
            exit 0
          fi
          git commit -m "Update CoredLab session state [skip ci]"
          git push origin HEAD:coredlab
